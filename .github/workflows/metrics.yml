name: Generate GitHub metrics

# Renders a rich SVG metrics panel into assets/metrics.svg.
# Referenced by README.md ("GitHub analytics" section).
#
# SETUP (one-time):
#   1. Create a fine-grained/classic PAT with `repo` + `read:user` scope.
#   2. Add it to this repo as a secret named METRICS_TOKEN
#      (Settings -> Secrets and variables -> Actions -> New repository secret).
# If the secret is absent the job is skipped, so the rest of the profile
# still builds cleanly.

on:
  schedule:
    - cron: "30 2 * * *"
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    if: ${{ github.actor != 'dependabot[bot]' }}
    steps:
      - name: Guard – require METRICS_TOKEN
        id: guard
        run: |
          if [ -n "${{ secrets.METRICS_TOKEN }}" ]; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "METRICS_TOKEN not set – skipping metrics generation."
            echo "ok=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Render metrics panel
        if: steps.guard.outputs.ok == 'true'
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: ${{ github.repository_owner }}
          filename: assets/metrics.svg
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Kolkata
          plugin_languages: yes
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
          plugin_lines: yes
          plugin_habits: yes
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          committer_message: "chore(metrics): refresh analytics panel [skip ci]"
