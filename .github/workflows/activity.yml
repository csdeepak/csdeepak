name: Update recent activity

# Fills the <!--START_SECTION:activity--> block in README.md with your
# latest public GitHub events. Fully automated, no secret required.

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6h
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  activity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update README with recent activity
        uses: jamesgeorge007/github-activity-readme@master
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMIT_MSG: "chore(activity): refresh recent activity [skip ci]"
          MAX_LINES: 5
