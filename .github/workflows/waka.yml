name: WakaTime weekly stats

# Fills the <!--START_SECTION:waka--> block in README.md with your weekly
# coding breakdown.
#
# SETUP (optional — placeholder shows until then):
#   1. Sign up at https://wakatime.com and grab your API key.
#   2. Add repo secret  WAKATIME_API_KEY.
# Without the secret the job self-skips and the placeholder stays.

on:
  schedule:
    - cron: "30 0 * * *"   # daily
  workflow_dispatch:

permissions:
  contents: write

jobs:
  waka:
    runs-on: ubuntu-latest
    steps:
      - name: Guard – require WAKATIME_API_KEY
        id: guard
        run: |
          if [ -n "${{ secrets.WAKATIME_API_KEY }}" ]; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "WAKATIME_API_KEY not set – keeping placeholder."
            echo "ok=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Update WakaTime block
        if: steps.guard.outputs.ok == 'true'
        uses: athul/waka-readme@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHOW_TITLE: "false"
          BLOCKS: "░▒▓█"
          TIME_RANGE: "last_7_days"
          COMMIT_MESSAGE: "chore(waka): refresh coding stats [skip ci]"
