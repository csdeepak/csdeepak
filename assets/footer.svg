<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 160" role="img" aria-label="Footer">
  <title>End of transmission</title>
  <defs>
    <linearGradient id="ftLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#42F5FF" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#42F5FF"/>
      <stop offset="1" stop-color="#42F5FF" stop-opacity="0"/>
    </linearGradient>
    <pattern id="ftGrid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#141414" stroke-width="1"/>
    </pattern>
    <clipPath id="ftClip"><rect width="1200" height="160" rx="16"/></clipPath>
    <style>.mono{font-family:'JetBrains Mono','SF Mono',ui-monospace,'DejaVu Sans Mono',monospace;}</style>
  </defs>

  <g clip-path="url(#ftClip)" class="mono">
    <rect width="1200" height="160" fill="#090909"/>
    <rect width="1200" height="160" fill="url(#ftGrid)" opacity="0.5"/>

    <rect x="180" y="70" width="840" height="1.5" fill="url(#ftLine)"/>

    <path d="M521 51 l7 6 l-7 6" fill="none" stroke="#42F5FF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="539" y="58" class="mono" font-size="15" fill="#6a6a6a">exit --status 0</text>
    <text x="600" y="108" text-anchor="middle" class="mono" font-size="14" fill="#b4b4b4">let's build systems that learn, remember and reason</text>
    <text x="600" y="134" text-anchor="middle" class="mono" font-size="11.5" fill="#3f3f3f">C S Deepak &#160;·&#160; hand-written SVG &#160;·&#160; no screenshots</text>

    <!-- subtle pulse accent, clear of the text -->
    <circle cx="505" cy="57" r="3" fill="#42F5FF">
      <animate attributeName="opacity" values="1;0.2;1" dur="2.2s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
