<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 340" role="img" aria-label="Tech stack">
  <title>Tech stack</title>
  <defs>
    <clipPath id="tsClip"><rect width="900" height="340" rx="16"/></clipPath>
    <style>
      .mono{font-family:'JetBrains Mono','SF Mono',ui-monospace,'DejaVu Sans Mono',monospace;}
      .chip{fill:#121212;stroke:#262626;stroke-width:1;}
      .cat{fill:#42F5FF;letter-spacing:3px;}
      .lbl{fill:#dcdcdc;}
    </style>
  </defs>

  <g clip-path="url(#tsClip)" class="mono">
    <rect width="900" height="340" fill="#0b0b0b"/>
    <rect width="900" height="44" fill="#121212"/>
    <circle cx="26" cy="22" r="5" fill="#2b2b2b"/><circle cx="46" cy="22" r="5" fill="#2b2b2b"/><circle cx="66" cy="22" r="5" fill="#2b2b2b"/>
    <text x="360" y="27" text-anchor="middle" class="mono" font-size="12.5" fill="#5f5f5f">deepak@system: ~/stack</text>
    <path d="M30 72 l7 6 l-7 6" fill="none" stroke="#42F5FF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="48" y="80" class="mono" font-size="14" fill="#ededed">cat stack.txt</text>

    <!-- languages -->
    <text x="30" y="122" class="mono cat" font-size="12">LANGUAGES</text>
    <g transform="translate(30,134)" class="mono" font-size="13">
      <g><rect class="chip" x="0"   width="88"  height="30" rx="6"/><text x="44"  y="20" text-anchor="middle" class="lbl">Python</text></g>
      <g><rect class="chip" x="100" width="64"  height="30" rx="6"/><text x="132" y="20" text-anchor="middle" class="lbl">Go</text></g>
      <g><rect class="chip" x="176" width="112" height="30" rx="6"/><text x="232" y="20" text-anchor="middle" class="lbl">JavaScript</text></g>
      <g><rect class="chip" x="300" width="60"  height="30" rx="6"/><text x="330" y="20" text-anchor="middle" class="lbl">C</text></g>
      <g><rect class="chip" x="372" width="72"  height="30" rx="6"/><text x="408" y="20" text-anchor="middle" class="lbl">Java</text></g>
    </g>

    <!-- ml / data -->
    <text x="30" y="190" class="mono cat" font-size="12">ML &amp; DATA</text>
    <g transform="translate(30,202)" class="mono" font-size="13">
      <g><rect class="chip" x="0"   width="88"  height="30" rx="6"/><text x="44"  y="20" text-anchor="middle" class="lbl">PyTorch</text></g>
      <g><rect class="chip" x="100" width="72"  height="30" rx="6"/><text x="136" y="20" text-anchor="middle" class="lbl">Redis</text></g>
      <g><rect class="chip" x="184" width="96"  height="30" rx="6"/><text x="232" y="20" text-anchor="middle" class="lbl">MongoDB</text></g>
    </g>

    <!-- systems / web -->
    <text x="30" y="258" class="mono cat" font-size="12">SYSTEMS &amp; WEB</text>
    <g transform="translate(30,270)" class="mono" font-size="13">
      <g><rect class="chip" x="0"   width="84"  height="30" rx="6"/><text x="42"  y="20" text-anchor="middle" class="lbl">Docker</text></g>
      <g><rect class="chip" x="96"  width="72"  height="30" rx="6"/><text x="132" y="20" text-anchor="middle" class="lbl">Linux</text></g>
      <g><rect class="chip" x="180" width="60"  height="30" rx="6"/><text x="210" y="20" text-anchor="middle" class="lbl">Git</text></g>
      <g><rect class="chip" x="252" width="76"  height="30" rx="6"/><text x="290" y="20" text-anchor="middle" class="lbl">React</text></g>
      <g><rect class="chip" x="340" width="96"  height="30" rx="6"/><text x="388" y="20" text-anchor="middle" class="lbl">Node.js</text></g>
    </g>

    <!-- cursor -->
    <path d="M30 314 l7 6 l-7 6" fill="none" stroke="#42F5FF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="48" y="322" class="mono" font-size="13.5" fill="#8a8a8a">_
      <animate attributeName="opacity" values="1;0.4;1" dur="1.4s" repeatCount="indefinite"/>
    </text>
  </g>
  <rect x="0.5" y="0.5" width="899" height="339" rx="16" fill="none" stroke="#1e1e1e"/>
</svg>
