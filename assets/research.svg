<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 360" role="img" aria-label="Research focus">
  <title>Research focus — agent memory architecture</title>
  <defs>
    <clipPath id="rsClip"><rect width="900" height="360" rx="16"/></clipPath>
    <marker id="rsArrow" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0 L8 4.5 L0 9 z" fill="#42F5FF"/>
    </marker>
    <style>
      .mono{font-family:'JetBrains Mono','SF Mono',ui-monospace,'DejaVu Sans Mono',monospace;}
      .node{fill:#121212;stroke:#2a2a2a;}
      .nlbl{fill:#ededed;}
      .sub{fill:#6a6a6a;}
      .ac{fill:#42F5FF;}
    </style>
  </defs>

  <g clip-path="url(#rsClip)" class="mono">
    <rect width="900" height="360" fill="#0b0b0b"/>
    <rect width="900" height="44" fill="#121212"/>
    <text x="30" y="28" class="mono sub" font-size="13" letter-spacing="3">RESEARCH<tspan class="ac">/</tspan> AGENT&#160;MEMORY&#160;LOOP</text>
    <line x1="0" y1="44" x2="900" y2="44" stroke="#1e1e1e"/>

    <!-- pipeline nodes -->
    <g>
      <!-- Perceive -->
      <rect class="node" x="40"  y="110" width="150" height="86" rx="12"/>
      <text x="115" y="150" text-anchor="middle" class="nlbl" font-size="16" font-weight="600">Perceive</text>
      <text x="115" y="172" text-anchor="middle" class="sub" font-size="11">vision · signals</text>

      <!-- Memory -->
      <rect class="node" x="255" y="110" width="150" height="86" rx="12" stroke="#42F5FF"/>
      <text x="330" y="150" text-anchor="middle" class="ac" font-size="16" font-weight="600">Remember</text>
      <text x="330" y="172" text-anchor="middle" class="sub" font-size="11">semantic memory</text>

      <!-- Reason -->
      <rect class="node" x="470" y="110" width="150" height="86" rx="12"/>
      <text x="545" y="150" text-anchor="middle" class="nlbl" font-size="16" font-weight="600">Reason</text>
      <text x="545" y="172" text-anchor="middle" class="sub" font-size="11">plan · knowledge</text>

      <!-- Act -->
      <rect class="node" x="685" y="110" width="150" height="86" rx="12"/>
      <text x="760" y="150" text-anchor="middle" class="nlbl" font-size="16" font-weight="600">Act</text>
      <text x="760" y="172" text-anchor="middle" class="sub" font-size="11">tools · agents</text>

      <!-- arrows -->
      <g stroke="#42F5FF" stroke-width="1.6" fill="none">
        <line x1="190" y1="153" x2="248" y2="153" marker-end="url(#rsArrow)"/>
        <line x1="405" y1="153" x2="463" y2="153" marker-end="url(#rsArrow)"/>
        <line x1="620" y1="153" x2="678" y2="153" marker-end="url(#rsArrow)"/>
      </g>
      <!-- feedback loop Act -> Remember -->
      <path d="M760 196 V232 H330 V196" fill="none" stroke="#2a2a2a" stroke-width="1.4" stroke-dasharray="4 5" marker-end="url(#rsArrow)"/>
      <text x="545" y="226" text-anchor="middle" class="sub" font-size="10.5">selective forgetting · consolidation</text>

      <!-- travelling signal -->
      <circle r="3" fill="#8afcff">
        <animateMotion dur="5s" repeatCount="indefinite"
          path="M115,153 H330 H545 H760 V232 H330 V153"/>
      </circle>
    </g>

    <!-- interest chips -->
    <g class="mono" font-size="12">
      <g><rect x="40"  y="280" width="132" height="30" rx="15" class="node"/><text x="106" y="300" text-anchor="middle" class="nlbl">Agentic AI</text></g>
      <g><rect x="184" y="280" width="150" height="30" rx="15" class="node"/><text x="259" y="300" text-anchor="middle" class="nlbl">Memory Systems</text></g>
      <g><rect x="346" y="280" width="168" height="30" rx="15" class="node"/><text x="430" y="300" text-anchor="middle" class="nlbl">Semantic Knowledge</text></g>
      <g><rect x="526" y="280" width="166" height="30" rx="15" class="node"/><text x="609" y="300" text-anchor="middle" class="nlbl">Distributed Systems</text></g>
      <g><rect x="704" y="280" width="150" height="30" rx="15" class="node"/><text x="779" y="300" text-anchor="middle" class="nlbl">ML Infra · CV</text></g>
    </g>
  </g>
  <rect x="0.5" y="0.5" width="899" height="359" rx="16" fill="none" stroke="#1e1e1e"/>
</svg>
