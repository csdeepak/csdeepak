<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" role="img" aria-label="Research timeline">
  <title>Research timeline</title>
  <!-- EDIT: dates/labels are placeholders — adjust to your real milestones -->
  <defs>
    <clipPath id="tlClip"><rect width="900" height="300" rx="16"/></clipPath>
    <linearGradient id="tlLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#42F5FF" stop-opacity="0.2"/>
      <stop offset="0.5" stop-color="#42F5FF"/>
      <stop offset="1" stop-color="#42F5FF" stop-opacity="0.2"/>
    </linearGradient>
    <style>
      .mono{font-family:'JetBrains Mono','SF Mono',ui-monospace,'DejaVu Sans Mono',monospace;}
      .yr{fill:#42F5FF;}
      .ti{fill:#ededed;}
      .sub{fill:#6a6a6a;}
    </style>
  </defs>

  <g clip-path="url(#tlClip)" class="mono">
    <rect width="900" height="300" fill="#0b0b0b"/>
    <text x="30" y="40" class="mono sub" font-size="13" letter-spacing="3">TIMELINE<tspan class="yr">/</tspan> RESEARCH&#160;&amp;&#160;BUILD</text>
    <line x1="0" y1="60" x2="900" y2="60" stroke="#1e1e1e"/>

    <!-- spine -->
    <line x1="70" y1="150" x2="830" y2="150" stroke="url(#tlLine)" stroke-width="2"/>

    <!-- nodes -->
    <g>
      <!-- n1 -->
      <circle cx="110" cy="150" r="6" fill="#0b0b0b" stroke="#42F5FF" stroke-width="2"/>
      <text x="110" y="112" text-anchor="middle" class="yr" font-size="13">2023</text>
      <text x="110" y="192" text-anchor="middle" class="ti" font-size="12">CS @ PES</text>
      <text x="110" y="208" text-anchor="middle" class="sub" font-size="10.5">foundations</text>

      <!-- n2 -->
      <circle cx="290" cy="150" r="6" fill="#0b0b0b" stroke="#42F5FF" stroke-width="2"/>
      <text x="290" y="112" text-anchor="middle" class="yr" font-size="13">2024</text>
      <text x="290" y="192" text-anchor="middle" class="ti" font-size="12">Dental Assistant</text>
      <text x="290" y="208" text-anchor="middle" class="sub" font-size="10.5">YOLO · U-Net · CV</text>

      <!-- n3 -->
      <circle cx="470" cy="150" r="6" fill="#0b0b0b" stroke="#42F5FF" stroke-width="2"/>
      <text x="470" y="112" text-anchor="middle" class="yr" font-size="13">2024</text>
      <text x="470" y="192" text-anchor="middle" class="ti" font-size="12">Docksmith</text>
      <text x="470" y="208" text-anchor="middle" class="sub" font-size="10.5">container runtime · Go</text>

      <!-- n4 -->
      <circle cx="650" cy="150" r="6" fill="#0b0b0b" stroke="#42F5FF" stroke-width="2"/>
      <text x="650" y="112" text-anchor="middle" class="yr" font-size="13">2025</text>
      <text x="650" y="192" text-anchor="middle" class="ti" font-size="12">ShortcutScore</text>
      <text x="650" y="208" text-anchor="middle" class="sub" font-size="10.5">shortcut learning</text>

      <!-- n5 current -->
      <circle cx="830" cy="150" r="9" fill="#0b0b0b" stroke="#42F5FF" stroke-width="2"/>
      <circle cx="830" cy="150" r="9" fill="none" stroke="#42F5FF" stroke-width="2">
        <animate attributeName="r" values="9;18;9" dur="2.6s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.8;0;0.8" dur="2.6s" repeatCount="indefinite"/>
      </circle>
      <circle cx="830" cy="150" r="3.5" fill="#42F5FF"/>
      <text x="830" y="112" text-anchor="middle" class="yr" font-size="13">now</text>
      <text x="830" y="192" text-anchor="middle" class="ti" font-size="12">ASMOS</text>
      <text x="830" y="208" text-anchor="middle" class="sub" font-size="10.5">semantic memory OS</text>
    </g>

    <path d="M30 271 l6 5 l-6 5" fill="none" stroke="#42F5FF" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="45" y="278" class="mono sub" font-size="11.5">git log --oneline --graph &#160;&#160;·&#160;&#160;<tspan fill="#8a8a8a">shipping research, one commit at a time</tspan></text>
  </g>
  <rect x="0.5" y="0.5" width="899" height="299" rx="16" fill="none" stroke="#1e1e1e"/>
</svg>
