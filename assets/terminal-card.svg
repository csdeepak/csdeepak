<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 500" role="img" aria-label="deepak.system dashboard">
  <title>deepak.system — status dashboard</title>
  <defs>
    <clipPath id="tcClip"><rect width="720" height="500" rx="16"/></clipPath>
    <style>
      .mono{font-family:'JetBrains Mono','SF Mono',ui-monospace,'DejaVu Sans Mono',monospace;}
      .lbl{fill:#5f5f5f;letter-spacing:4px;}
      .val{fill:#ededed;}
      .ac{fill:#42F5FF;}
      .dim{fill:#8a8a8a;}
    </style>
  </defs>

  <g clip-path="url(#tcClip)" class="mono">
    <rect width="720" height="500" fill="#0d0d0d"/>
    <rect width="720" height="500" fill="#121212" opacity="0.6"/>

    <!-- window bar (monochrome dots — no rainbow) -->
    <rect width="720" height="44" fill="#121212"/>
    <circle cx="26" cy="22" r="5" fill="#2b2b2b"/>
    <circle cx="46" cy="22" r="5" fill="#2b2b2b"/>
    <circle cx="66" cy="22" r="5" fill="#2b2b2b"/>
    <text x="360" y="27" text-anchor="middle" class="mono" font-size="12.5" fill="#5f5f5f">deepak@system: ~/dashboard</text>
    <line x1="0" y1="44" x2="720" y2="44" stroke="#1e1e1e"/>

    <!-- prompt -->
    <path d="M34 74 l7 6 l-7 6" fill="none" stroke="#42F5FF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="52" y="82" class="mono val" font-size="14">./status --live</text>

    <!-- STATUS -->
    <text x="34" y="126" class="mono lbl" font-size="12">STATUS</text>
    <text x="34" y="152" class="mono val" font-size="20" font-weight="600">Building intelligent memory systems<tspan class="ac">.</tspan></text>
    <g>
      <circle cx="638" cy="120" r="4.5" class="ac"><animate attributeName="opacity" values="1;0.2;1" dur="1.8s" repeatCount="indefinite"/></circle>
      <text x="628" y="124" text-anchor="end" class="mono ac" font-size="11">online</text>
    </g>

    <line x1="34" y1="176" x2="686" y2="176" stroke="#1a1a1a"/>

    <!-- CURRENT -->
    <text x="34" y="212" class="mono lbl" font-size="12">CURRENT</text>
    <g fill="#42F5FF">
      <path d="M34 233 l8 4 l-8 4 z"/>
      <path d="M34 261 l8 4 l-8 4 z"/>
      <path d="M34 289 l8 4 l-8 4 z"/>
    </g>
    <g class="mono" font-size="15">
      <text x="50" y="242"><tspan class="val">ASMOS</tspan>&#160;&#160;&#160;<tspan class="dim">adaptive semantic memory OS</tspan></text>
      <text x="50" y="270"><tspan class="val">ShortcutScore</tspan>&#160;&#160;&#160;<tspan class="dim">measuring shortcut learning</tspan></text>
      <text x="50" y="298"><tspan class="val">Docksmith</tspan>&#160;&#160;&#160;<tspan class="dim">a container runtime in Go</tspan></text>
    </g>

    <line x1="34" y1="322" x2="686" y2="322" stroke="#1a1a1a"/>

    <!-- MISSION -->
    <text x="34" y="358" class="mono lbl" font-size="12">MISSION</text>
    <text x="34" y="386" class="mono val" font-size="15">Design infrastructure that lets AI agents</text>
    <text x="34" y="410" class="mono val" font-size="15"><tspan class="ac">learn</tspan>, <tspan class="ac">remember</tspan>, <tspan class="ac">collaborate</tspan> and <tspan class="ac">reason</tspan>.</text>

    <!-- footer prompt -->
    <line x1="0" y1="452" x2="720" y2="452" stroke="#1a1a1a"/>
    <path d="M34 474 l7 6 l-7 6" fill="none" stroke="#42F5FF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="52" y="470" width="9" height="16" class="ac">
      <animate attributeName="opacity" values="1;0;1" dur="1.1s" repeatCount="indefinite"/>
    </rect>
  </g>
  <rect x="0.5" y="0.5" width="719" height="499" rx="16" fill="none" stroke="#1e1e1e"/>
</svg>
