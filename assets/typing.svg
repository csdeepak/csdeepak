<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 60" role="img" aria-label="Focus areas">
  <title>What I'm building</title>
  <defs>
    <style>.mono{font-family:'JetBrains Mono','SF Mono',ui-monospace,'DejaVu Sans Mono',monospace;}</style>
  </defs>

  <path d="M6 26 l9 8 l-9 8" fill="none" stroke="#42F5FF" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Phrase 1 -->
  <clipPath id="ty1"><rect x="34" y="12" height="38">
    <animate attributeName="width" values="0;0;560;560;0;0" keyTimes="0;0.01;0.17;0.30;0.33;1" dur="16s" repeatCount="indefinite"/>
  </rect></clipPath>
  <g clip-path="url(#ty1)"><text x="34" y="38" class="mono" font-size="21" fill="#ededed">architecting <tspan fill="#42F5FF">memory systems</tspan> for AI agents<tspan fill="#42F5FF" dx="4">█</tspan></text></g>

  <!-- Phrase 2 -->
  <clipPath id="ty2"><rect x="34" y="12" height="38">
    <animate attributeName="width" values="0;0;560;560;0;0" keyTimes="0;0.34;0.49;0.62;0.65;1" dur="16s" repeatCount="indefinite"/>
  </rect></clipPath>
  <g clip-path="url(#ty2)"><text x="34" y="38" class="mono" font-size="21" fill="#ededed">designing <tspan fill="#42F5FF">multi-agent</tspan> infrastructure<tspan fill="#42F5FF" dx="4">█</tspan></text></g>

  <!-- Phrase 3 -->
  <clipPath id="ty3"><rect x="34" y="12" height="38">
    <animate attributeName="width" values="0;0;600;600;0;0" keyTimes="0;0.66;0.81;0.94;0.97;1" dur="16s" repeatCount="indefinite"/>
  </rect></clipPath>
  <g clip-path="url(#ty3)"><text x="34" y="38" class="mono" font-size="21" fill="#ededed">making agents <tspan fill="#42F5FF">learn, remember and reason</tspan><tspan fill="#42F5FF" dx="4">█</tspan></text></g>
</svg>
